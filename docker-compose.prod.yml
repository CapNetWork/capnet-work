# Production stack: no volume mounts, API and web run in production mode.
# Set env in .env or export before: DATABASE_URL, NEXT_PUBLIC_API_URL, ALLOWED_ORIGINS (optional).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: capnet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capnet_prod_change_me}
      POSTGRES_DB: capnet
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://capnet:capnet_prod_change_me@db:5432/capnet}
      PORT: 4000
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      AGENTMAIL_API_KEY: ${AGENTMAIL_API_KEY:-}
      AGENTMAIL_API_BASE_URL: ${AGENTMAIL_API_BASE_URL:-}
      AGENTMAIL_WEBHOOK_SECRET: ${AGENTMAIL_WEBHOOK_SECRET:-}
      AGENTMAIL_WEBHOOK_SKIP_VERIFY: ${AGENTMAIL_WEBHOOK_SKIP_VERIFY:-0}
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "start", "--workspace=apps/api"]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: ${API_URL:-http://api:4000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - api

volumes:
  pgdata:

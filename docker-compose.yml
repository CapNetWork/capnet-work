services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: capnet
      POSTGRES_PASSWORD: capnet_dev
      POSTGRES_DB: capnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    # If bind fails (address already in use), set API_HOST_PORT=4001 in .env and
    # NEXT_PUBLIC_API_URL=http://localhost:4001 for the web service.
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    environment:
      DATABASE_URL: postgres://capnet:capnet_dev@db:5432/capnet
      PORT: 4000
      NODE_ENV: development
      BANKR_API_BASE_URL: ${BANKR_API_BASE_URL:-https://api.bankr.bot}
      BANKR_SECRET_ENCRYPTION_KEY: ${BANKR_SECRET_ENCRYPTION_KEY:-}
      REWARD_ADMIN_SECRET: ${REWARD_ADMIN_SECRET:-}
      ENABLE_PAYOUT_CRON: ${ENABLE_PAYOUT_CRON:-0}
      BANKR_DEV_SKIP_VALIDATE: ${BANKR_DEV_SKIP_VALIDATE:-0}
      BANKR_DEV_MOCK_WALLET: ${BANKR_DEV_MOCK_WALLET:-}
      BANKR_DEV_MOCK_SOLANA_WALLET: ${BANKR_DEV_MOCK_SOLANA_WALLET:-}
      AGENTMAIL_API_KEY: ${AGENTMAIL_API_KEY:-}
      AGENTMAIL_INBOX_DOMAIN: ${AGENTMAIL_INBOX_DOMAIN:-}
      AGENTMAIL_WEBHOOK_SECRET: ${AGENTMAIL_WEBHOOK_SECRET:-}
      AGENTMAIL_DEV_SKIP_WEBHOOK_VERIFY: ${AGENTMAIL_DEV_SKIP_WEBHOOK_VERIFY:-0}
      # Apply schema + migrations on API startup (needs ./infra mounted below).
      AUTO_MIGRATE: ${AUTO_MIGRATE:-1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./infra:/app/infra
      - ./packages:/app/packages
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules

volumes:
  pgdata:
